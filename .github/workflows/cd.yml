name: CD — Plan on Merge to Main

on:
  push:
    branches: [main]  # Triggers only when code is merged to main

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read   # Required to checkout code

env:
  TF_VERSION:     "1.7.5"
  TF_WORKING_DIR: "./terraform"
  AWS_REGION:     "eu-west-1"

jobs:
  plan:
    name: Terraform Plan (main)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true
        # OIDC role is configured in Terraform — requires live AWS account to authenticate
        # continue-on-error: true allows pipeline to run without real AWS credentials

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false -reconfigure
        # -backend=false — S3 backend configured in main.tf as concept, not active
        # -reconfigure — ensures clean init on every run

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true
        # -out=tfplan — saves plan binary for artifact upload
        # plan_output.txt — human-readable output for job summary
        # continue-on-error: true — allows artifact upload even if plan has warnings

      # ── Save plan file as a downloadable artifact ───────────────────────────
      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-main-${{ github.sha }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 30
          # Kept for 30 days — download and apply manually after review
          # Apply with: terraform apply tfplan

      # ── Write a summary to the GitHub Actions job page ─────────────────────
      - name: Write Job Summary
        run: |
          PLAN=$(cat ${{ env.TF_WORKING_DIR }}/plan_output.txt)
          TRUNCATED="${PLAN:0:60000}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Terraform Plan — \`main\` branch
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** \`${{ github.actor }}\`
          **Time:** \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\`
          > ⚠️ **This workflow never runs \`terraform apply\`.**
          > Download the \`tfplan\` artifact and apply manually after review:
          > \`terraform apply tfplan\`
          ## Plan Output
          \`\`\`hcl
          ${TRUNCATED}
          \`\`\`
          EOF

      # ── Notify on failure ───────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Terraform plan failed on main branch — check the logs above."
          # In production, wire this to Slack or PagerDuty via a webhook secret

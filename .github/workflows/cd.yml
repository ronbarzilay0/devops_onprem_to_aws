name: CD — Plan on Merge to Main
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
env:
  TF_VERSION:     "1.7.5"
  TF_WORKING_DIR: "./terraform"
  AWS_REGION:     "eu-west-1"
jobs:
  plan:
    name: Terraform Plan (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      # 1 — terraform init and plan
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false -reconfigure

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      # 2 — upload plan as artifact
      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-main-${{ github.sha }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 30

      # 3 — post summary to job page
      - name: Write Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Terraform Plan — \`main\` branch
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** \`${{ github.actor }}\`
          **Status:** ${{ steps.plan.outcome == 'success' && '✅ Success' || '❌ Failed' }}

          > ⚠️ This workflow never runs \`terraform apply\`.
          > Download the \`tfplan\` artifact and apply manually after review.
          EOF
